<!DOCTYPE html>
<html th:replace="~{layout/app :: layout(${isAddMode}?'料金新規登録':'料金情報編集', ~{::content}, 'charge')}"
  xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<div th:fragment="content">
  <!--/*編集画面*/-->
  <div th:if="!${#strings.isEmpty(message)}" class="alert alert-success">
    <span th:text="${message}"></span>
  </div>
  <form th:action="${isAddMode}?@{/charge/add}:@{/charge/update}" th:object="${charge}" method="post">
    <input type="hidden" th:field="*{chargeId}">
    <label for="name">料金名
      <input type="text" th:field="*{name}" maxlength="128">
      <span class="error-message" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
    </label>
    <label for="amount">月額料金
      <input type="text" th:field="*{amount}">
      <span class="error-message" th:if="${#fields.hasErrors('amount')}" th:errors="*{amount}"></span>
    </label>
    <label for="startDate">適用開始日
      <input type="date" th:field="*{startDate}">
      <span class="error-message" th:if="${#fields.hasErrors('startDate')}" th:errors="*{startDate}"></span>
    </label>
    <label for="endDate">適用終了日
      <input type="date" th:field="*{endDate}">
      <span class="error-message" th:if="${#fields.hasErrors('endDate')}" th:errors="*{endDate}"></span>
    </label>
    <div class="button-group-spread">
      <div class="button-group">
        <button type="submit">保存</button>
        <a role="button" class="secondary" th:href="@{/charge/search}">キャンセル</a>
      </div>
      <div th:if="!${isAddMode}">
        <a role="button" class="contrast" id="delete" th:href="@{/charge/delete/{id}(id=*{chargeId})}">削除</a>
      </div>
    </div>
  </form>
  <script th:inline="javascript">
    document.addEventListener("DOMContentLoaded", (e) => {
      const deleteBtn = document.getElementById("delete");
      deleteBtn.addEventListener("click", (e) => {
        const result = confirm("id:[[${charge.chargeId}]]を削除してもよろしいですか？");
        if (!result) {
          e.preventDefault();
        }
        return result;
      });
    });
  </script>
</div>

</html>
